name: push container to registry
runs:
  using: composite
  steps:
    # TODO: remove me when we have a new podman in 26.04 runners
    # needed because old podman doesn't push layer annotations for
    # the rpm-ostree rechunker at all
    - name: Install Podman from Brew
      shell: bash
      run: |
        /home/linuxbrew/.linuxbrew/bin/brew install podman

    - name: Login to registry
      shell: bash
      run: |
        sudo podman login --username $username --password $password $registry

    - name: Push to registry
      shell: bash
      run: |
        # HACK: push twice as a workaround to push rechunk annotations
        sudo /home/linuxbrew/.linuxbrew/bin/podman push $registry/$name:$tag
        sudo /home/linuxbrew/.linuxbrew/bin/podman push $registry/$name:$tag

    - name: Latest
      if: ${{ env.latest }}
      shell: bash
      run: |
        sudo podman image tag $registry/$name:$tag $registry/$name:latest
        sudo /home/linuxbrew/.linuxbrew/bin/podman push $registry/$name:latest
        sudo /home/linuxbrew/.linuxbrew/bin/podman push $registry/$name:latest
